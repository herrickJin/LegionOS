<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegionOS</title>
<style>
/* ============================================================
   DESIGN TOKENS — 产研数字军团OS v2.0
   Style: Professional Modern App (Linear × Notion × Vercel)
   ============================================================ */
:root {
  /* --- Color: Surfaces --- */
  --bg-app: #F7F8FA;
  --bg-surface: #FFFFFF;
  --bg-elevated: #FFFFFF;
  --bg-hover: #F3F4F6;
  --bg-active: #ECEEF2;
  --bg-subtle: #FAFAFB;
  --border-default: #E6E8EC;
  --border-subtle: #EEF0F3;
  --border-strong: #C9CDD4;

  /* --- Color: Text --- */
  --text-900: #111827;
  --text-800: #1F2937;
  --text-700: #374151;
  --text-600: #4B5563;
  --text-500: #6B7280;
  --text-400: #9CA3AF;
  --text-300: #D1D5DB;
  --text-inverse: #FFFFFF;

  /* --- Color: Primary (Graphite) --- */
  --primary-50: #F3F4F6;
  --primary-100: #E5E7EB;
  --primary-200: #D1D5DB;
  --primary-300: #B8BDC7;
  --primary-500: #4B5563;
  --primary-600: #111827;
  --primary-700: #0B1220;
  --primary-900: #030712;

  /* --- Color: Flow Accents --- */
  --flow-bug: #D97706;
  --flow-bug-bg: #FFFBEB;
  --flow-bug-soft: #FEF3C7;
  --flow-incident: #DC2626;
  --flow-incident-bg: #FEF2F2;
  --flow-incident-soft: #FECACA;
  --flow-feature: #059669;
  --flow-feature-bg: #ECFDF5;
  --flow-feature-soft: #A7F3D0;
  --flow-initiative: #7C3AED;
  --flow-initiative-bg: #F5F3FF;
  --flow-initiative-soft: #DDD6FE;
  --flow-review: #2563EB;
  --flow-review-bg: #EFF6FF;
  --flow-review-soft: #BFDBFE;
  --flow-delivery: #0D9488;
  --flow-delivery-bg: #F0FDFA;
  --flow-delivery-soft: #99F6E4;

  /* --- Color: Semantic --- */
  --success: #10B981;
  --warning: #F59E0B;
  --error: #EF4444;
  --info: #3B82F6;

  /* --- Typography --- */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
  --text-xs: 11px;
  --text-sm: 12px;
  --text-base: 13px;
  --text-md: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --text-3xl: 30px;
  --lh-tight: 1.25;
  --lh-normal: 1.5;
  --lh-relaxed: 1.65;

  /* --- Spacing (4px base) --- */
  --sp-0: 0;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-10: 40px;
  --sp-12: 48px;

  /* --- Radius --- */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 8px;
  --r-xl: 8px;
  --r-2xl: 12px;
  --r-full: 9999px;

  /* --- Shadows --- */
  --shadow-xs: none;
  --shadow-sm: none;
  --shadow-md: none;
  --shadow-lg: 0 16px 40px rgba(15,23,42,0.10);

  /* --- Transitions --- */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --t-fast: 120ms var(--ease);
  --t-normal: 200ms var(--ease);
  --t-slow: 350ms var(--ease);

  /* --- Layout --- */
  --sidebar-w: 260px;
  --sidebar-w-collapsed: 64px;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: var(--font-sans); background: #F3F4F6; color: var(--text-900); font-size: var(--text-base); line-height: var(--lh-normal); overflow: hidden; height: 100vh; }
a { color: var(--primary-600); text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; outline: none; }
::selection { background: var(--primary-100); color: var(--primary-700); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-400); }

/* ============================================================
   APP SHELL — PC Client Style
   Light sidebar: large border-radius, low-contrast, airy, quiet.
   ============================================================ */
body {
  background: #F3F4F6;
}

/* --- App Layout Wrapper --- */
.app-shell {
  display: flex; height: 100vh; overflow: hidden;
  padding: var(--sp-3);
  gap: 0;
}

/* --- Sidebar: Light, rounded, floating --- */
.sidebar {
  width: var(--sidebar-w);
  background: #FFFFFF;
  border-radius: 14px;
  display: flex; flex-direction: column;
  border: 1px solid var(--border-default);
  box-shadow: none;
  overflow: hidden;
  flex-shrink: 0;
  transition: width var(--t-normal);
  position: relative;
}

/* Sidebar header: Logo */
.sidebar-header {
  padding: var(--sp-5) var(--sp-5) var(--sp-3);
  flex-shrink: 0;
}
.sidebar-logo {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-1) var(--sp-1); border-radius: var(--r-lg);
  cursor: pointer; transition: background var(--t-fast);
  margin-bottom: var(--sp-4);
}
.sidebar-logo:hover { background: var(--bg-hover); }
.sidebar-logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: #111827;
  display: flex; align-items: center; justify-content: center;
  box-shadow: none;
  flex-shrink: 0;
}
.sidebar-logo-icon svg { width: 18px; height: 18px; fill: #fff; }
.sidebar-logo-text {
  font-size: 16px; font-weight: 700;
  letter-spacing: 0; color: var(--text-900);
}

/* Search trigger */
.sidebar-search {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: 8px 12px; border-radius: 8px;
  background: #FFFFFF;
  border: 1px solid var(--border-default);
  cursor: pointer; transition: all var(--t-fast);
  font-size: var(--text-sm); color: var(--text-400);
}
.sidebar-search:hover {
  background: var(--bg-hover);
  border-color: var(--border-subtle);
  color: var(--text-500);
}
.sidebar-search svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
.sidebar-search span { flex: 1; }
.sidebar-search kbd {
  font-size: 10px; font-family: var(--font-sans);
  background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: 4px; padding: 1px 5px; color: var(--text-400); line-height: 1.4;
}

/* Sidebar nav */
.sidebar-scroll {
  flex: 1; overflow-y: auto; padding: var(--sp-1) var(--sp-3);
}
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }

.sb-section { margin-bottom: var(--sp-2); }
.sb-section-label {
  font-size: 10px; font-weight: 600; color: var(--text-400);
  padding: var(--sp-3) var(--sp-3) var(--sp-1);
  letter-spacing: 0.6px; text-transform: uppercase;
}
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  font-size: var(--text-sm); font-weight: 450; color: var(--text-500);
  transition: all var(--t-fast); cursor: pointer; position: relative;
}
.sb-item:hover { background: var(--bg-hover); color: var(--text-700); }
.sb-item.active {
  background: #F4F5F7; color: var(--text-900); font-weight: 600;
}
.sb-icon {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sb-icon svg { width: 17px; height: 17px; fill: currentColor; }
.sb-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-badge {
  background: #EF4444; color: #fff; font-size: 10px; font-weight: 600;
  padding: 0 5px; border-radius: var(--r-full); min-width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sb-count { font-size: var(--text-xs); color: var(--text-400); font-weight: 500; flex-shrink: 0; }

/* --- Sidebar Divider --- */
.sb-divider {
  height: 1px; background: var(--border-subtle);
  margin: var(--sp-2) var(--sp-4);
}

/* --- Sidebar Footer: Utilities + User --- */
.sidebar-footer {
  padding: var(--sp-2) var(--sp-3) var(--sp-4);
  flex-shrink: 0;
}
.sb-footer-section {
  padding: 0 var(--sp-1);
}
.sidebar-user {
  padding-top: var(--sp-2); margin-top: var(--sp-1);
  border-top: 1px solid var(--border-subtle);
  padding-left: var(--sp-1);
  padding-right: var(--sp-1);
  padding-bottom: 0;
}
.sb-user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 12px;
  cursor: pointer; transition: background var(--t-fast);
}
.sb-user-card:hover { background: var(--bg-hover); }
.sb-avatar {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-sm); font-weight: 600; color: #fff; flex-shrink: 0;
}
.sb-user-info { flex: 1; min-width: 0; }
.sb-user-name { font-size: var(--text-sm); font-weight: 600; color: var(--text-900); }
.sb-user-role {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 4px;
}
.sb-user-role .role-dot { width: 6px; height: 6px; border-radius: 50%; }
.sb-user-arrow { width: 14px; height: 14px; fill: var(--text-300); flex-shrink: 0; }

/* --- Role Switcher Dropdown --- */
.role-dropdown {
  position: absolute; bottom: 72px; left: var(--sp-3); right: var(--sp-3);
  background: var(--bg-elevated); border: 1px solid var(--border-default);
  border-radius: 14px; box-shadow: var(--shadow-lg);
  padding: var(--sp-1); z-index: 300; display: none;
}
.role-dropdown.show { display: block; }
.role-option {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-3); border-radius: 10px;
  cursor: pointer; transition: background var(--t-fast);
}
.role-option:hover { background: var(--bg-hover); }
.role-option.active { background: var(--primary-50); }
.role-option-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.role-option-info { flex: 1; }
.role-option-name { font-size: var(--text-sm); font-weight: 600; color: var(--text-900); }
.role-option-desc { font-size: 11px; color: var(--text-400); }
.role-option-check { width: 16px; height: 16px; fill: var(--primary-600); flex-shrink: 0; }

/* ============================================================
   MAIN CONTENT AREA — Floating card style
   ============================================================ */
.main {
  flex: 1; overflow-y: auto;
  background: var(--bg-surface);
  border-radius: 14px;
  margin: 0 0 0 var(--sp-3);
  border: 1px solid var(--border-default);
  box-shadow: none;
}

/* ============================================================
   TASK HOME VIEW v3 — Split Layout
   ============================================================ */
.home {
  display: flex; height: 100%; overflow: hidden;
}

/* --- Left: Task List --- */
.home-left {
  width: 400px; min-width: 400px; border-right: 1px solid var(--border-default);
  display: flex; flex-direction: column; background: var(--bg-surface);
}

.home-left-header {
  padding: var(--sp-6) var(--sp-5) 0;
  flex-shrink: 0;
}
.home-greeting {
  font-size: var(--text-xl); font-weight: 700; letter-spacing: 0;
  color: var(--text-900); margin-bottom: var(--sp-4);
}

/* --- Stats Row (compact pill style) --- */
.home-stats {
  display: flex; gap: var(--sp-2); margin-bottom: var(--sp-4);
}
.stat-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 7px;
  font-size: var(--text-xs); font-weight: 600;
  background: transparent; color: var(--text-500);
  transition: all var(--t-fast);
}
.stat-pill-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.stat-pill-num { font-weight: 700; }

/* --- Filters (segment control style) --- */
.home-filters {
  display: flex; gap: 18px; margin-bottom: var(--sp-5);
  background: transparent; border-radius: 0;
  padding: 0; overflow-x: auto; flex-shrink: 0;
  border-bottom: none;
  scrollbar-width: none;
}
.home-filters::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 0; border-radius: 0;
  font-size: var(--text-xs); font-weight: 550; cursor: pointer;
  border: none; background: transparent;
  color: var(--text-500); transition: all var(--t-fast);
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.filter-chip:hover { color: var(--text-700); }
.filter-chip.active {
  background: transparent; color: var(--text-900);
  box-shadow: none; font-weight: 700;
}
.filter-dot { display: none; }

/* --- Task list scroll area --- */
.home-task-list {
  flex: 1; overflow-y: auto; padding: 0 var(--sp-3) var(--sp-4);
}
.home-task-list::-webkit-scrollbar { width: 4px; }
.home-task-list::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }

/* --- Task Group --- */
.task-group { margin-bottom: var(--sp-4); }
.task-group-header {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-2) var(--sp-1);
  position: sticky; top: 0; background: var(--bg-surface); z-index: 2;
}
.task-group-title {
  font-size: var(--text-xs); font-weight: 600; color: var(--text-500);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.task-group-count {
  font-size: var(--text-xs); color: var(--text-400); font-weight: 500;
  background: var(--bg-hover); padding: 0 6px; border-radius: var(--r-full);
  line-height: 18px;
}

/* --- Task Card v3 (compact, selectable) --- */
.task-card {
  display: flex; align-items: flex-start; gap: var(--sp-3);
  padding: 11px 10px; border-radius: 8px;
  cursor: pointer; transition: all var(--t-fast);
  margin-bottom: 2px; position: relative; border: 1px solid transparent;
}
.task-card:hover { background: var(--bg-hover); }
.task-card.selected {
  background: #FAFAFA; border-color: var(--border-strong);
}
.task-card.selected .tc-title { color: var(--text-900); }

.tc-flow-dot {
  width: 7px; height: 7px; border-radius: 50%; margin-top: 7px; flex-shrink: 0;
  box-shadow: none;
}

.tc-body { flex: 1; min-width: 0; }
.tc-title {
  font-size: var(--text-sm); font-weight: 600; color: var(--text-800);
  margin-bottom: 3px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.tc-meta {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: var(--sp-2);
}
.tc-meta-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--text-300); }

.tc-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  flex-shrink: 0; padding-top: 2px;
}
.tc-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px; border-radius: var(--r-full);
  font-size: 10px; font-weight: 600;
}
.tc-tag-dot { width: 4px; height: 4px; border-radius: 50%; }
.tc-step { font-size: 10px; color: var(--text-400); font-weight: 500; white-space: nowrap; }

/* --- Priority Badges --- */
.priority {
  display: inline-flex; align-items: center; padding: 1px 5px;
  border-radius: 5px; font-size: 10px; font-weight: 700;
  letter-spacing: 0;
}
.p0 { background: #FFF1F2; color: #DC2626; }
.p1 { background: #FFFBEB; color: #B45309; }
.p2 { background: #F3F4F6; color: var(--text-600); }
.p3 { background: var(--bg-hover); color: var(--text-500); }

/* --- Right: Task Preview (Card Style v2) --- */
.home-right {
  flex: 1; display: flex; flex-direction: column;
  background: #FAFAFA; overflow-y: auto;
  scrollbar-width: none;
}
.home-right::-webkit-scrollbar { display: none; }

.preview-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: var(--text-400);
}
.preview-empty-icon {
  width: 72px; height: 72px; border-radius: 20px;
  background: var(--bg-hover); display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-5);
}
.preview-empty-icon svg { width: 32px; height: 32px; fill: var(--text-300); }
.preview-empty-text { font-size: var(--text-md); font-weight: 600; color: var(--text-600); }
.preview-empty-hint { font-size: var(--text-xs); margin-top: var(--sp-2); }

/* Detail Card Layout */
.detail-scroll {
  flex: 0 0 auto; overflow: visible; padding: 28px 32px 22px;
  display: flex; flex-direction: column; gap: 18px;
  width: min(100%, 960px);
}
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }

/* Hero Card */
.detail-hero {
  position: relative; border-radius: var(--r-xl); overflow: hidden;
  padding: var(--sp-6); min-height: 140px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.detail-hero-deco {
  position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  opacity: 0.15; filter: blur(30px); pointer-events: none;
}
.detail-hero-deco2 {
  position: absolute; top: 20px; right: 40px;
  width: 80px; height: 80px; border-radius: 50%;
  opacity: 0.1; filter: blur(20px); pointer-events: none;
}
.detail-hero-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
  padding: 3px 10px; border-radius: var(--r-full);
  font-size: 10px; font-weight: 700; color: #fff;
  margin-bottom: var(--sp-3); width: fit-content;
  letter-spacing: 0.3px; text-transform: uppercase;
}
.detail-hero-badge svg { width: 12px; height: 12px; fill: #fff; }
.detail-hero-title {
  font-size: var(--text-lg); font-weight: 700; color: #fff;
  line-height: 1.35; letter-spacing: 0; margin-bottom: var(--sp-3);
  text-shadow: 0 1px 3px rgba(0,0,0,0.15);
}
.detail-hero-meta {
  display: flex; align-items: center; gap: var(--sp-3); flex-wrap: wrap;
}
.detail-hero-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(6px);
  padding: 2px 8px; border-radius: var(--r-full);
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.9);
}
.detail-hero-chip svg { width: 12px; height: 12px; fill: rgba(255,255,255,0.7); }

/* Progress Rail */
.detail-progress-card {
  background: transparent; border-radius: 0;
  border: none; border-top: 1px solid var(--border-subtle); padding: var(--sp-4) 0 0;
}
.detail-progress-label {
  font-size: 10px; font-weight: 600; color: var(--text-400);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: var(--sp-3);
}
.detail-progress-rail {
  display: flex; align-items: center; gap: 0;
  position: relative;
}
.detail-progress-node {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; position: relative; min-width: 0;
}
.detail-progress-dot {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; position: relative; z-index: 2;
  transition: all var(--t-fast); flex-shrink: 0;
}
.detail-progress-dot.done { background: var(--success); color: #fff; }
.detail-progress-dot.current { color: #fff; box-shadow: none; }
.detail-progress-dot.future { background: var(--bg-hover); color: var(--text-400); }
.detail-progress-name {
  font-size: 10px; color: var(--text-500); font-weight: 500;
  margin-top: 6px; text-align: center; line-height: 1.3;
  max-width: 72px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.detail-progress-node.is-current .detail-progress-name {
  color: var(--text-900); font-weight: 600;
}
.detail-progress-line {
  position: absolute; top: 11px; height: 2px;
  background: var(--border-subtle); z-index: 1;
}
.detail-progress-line.done { background: var(--success); }

.ai-help-panel {
  border-top: 1px solid var(--border-subtle);
  padding-top: var(--sp-5);
}
.ai-help-header {
  display: flex; align-items: center; gap: var(--sp-3);
  margin-bottom: var(--sp-4);
}
.ai-help-avatar {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-sm); font-weight: 700; color: #fff;
  background: var(--primary-600);
}
.ai-help-title {
  font-size: var(--text-md); font-weight: 700; color: var(--text-900);
}
.ai-help-subtitle {
  font-size: var(--text-xs); color: var(--text-500);
  margin-top: 2px;
}
.ai-help-list {
  display: flex; flex-direction: column;
  gap: 2px;
}
.ai-help-item {
  border: none;
  border-top: 1px solid var(--border-subtle);
  border-radius: 0;
  padding: 11px 0;
  background: transparent;
}
.ai-help-item:first-child { border-top: none; }
.ai-help-item-title {
  font-size: var(--text-sm); font-weight: 700;
  color: var(--text-800); margin-bottom: 6px;
}
.ai-help-item-desc {
  font-size: var(--text-xs); color: var(--text-500);
  line-height: 1.6;
}
.user-choice-note {
  margin-top: var(--sp-4);
  padding: var(--sp-3) var(--sp-4);
  border-radius: 8px;
  background: #F7F8FA;
  color: var(--text-600);
  font-size: var(--text-xs);
  line-height: 1.6;
}

.preview-action-row {
  display: flex; align-items: center; gap: var(--sp-3);
  margin-top: var(--sp-4);
}
.preview-action {
  display: inline-flex; align-items: center; gap: 7px;
  height: 32px; padding: 0 12px;
  border-radius: 7px;
  font-size: var(--text-xs); font-weight: 650;
  border: 1px solid var(--border-default);
  background: #FFFFFF; color: var(--text-700);
  transition: all var(--t-fast);
}
.preview-action:hover {
  border-color: var(--border-strong);
  background: var(--bg-hover);
  color: var(--text-900);
}
.preview-action.primary {
  background: var(--primary-600);
  border-color: var(--primary-600);
  color: #FFFFFF;
}
.preview-action svg { width: 13px; height: 13px; fill: currentColor; }

/* Context Grid */
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3);
}
.detail-grid-item {
  background: var(--bg-surface); border-radius: var(--r-lg);
  border: 1px solid var(--border-subtle); padding: var(--sp-3) var(--sp-4);
  display: flex; flex-direction: column; gap: 4px;
}
.detail-grid-label {
  font-size: 10px; font-weight: 600; color: var(--text-400);
  text-transform: uppercase; letter-spacing: 0.3px;
}
.detail-grid-value {
  font-size: var(--text-sm); font-weight: 600; color: var(--text-800);
}
.detail-grid-sub {
  font-size: 11px; color: var(--text-500); font-weight: 400;
}

/* Action-first preview */
.detail-action-card {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0 0 var(--sp-4);
  box-shadow: none;
}
.detail-action-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: var(--sp-4); margin-bottom: var(--sp-4);
}
.detail-action-eyebrow {
  font-size: 10px; font-weight: 700; color: var(--text-400);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--sp-2);
}
.detail-action-title {
  font-size: 22px; font-weight: 720; color: var(--text-900);
  line-height: 1.3;
}
.detail-action-meta {
  display: flex; flex-wrap: wrap; gap: var(--sp-2);
}
.detail-action-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 7px; border-radius: 6px;
  background: #F1F2F4; color: var(--text-600);
  font-size: var(--text-xs); font-weight: 600; white-space: nowrap;
}
.detail-next-box {
  border-radius: 8px;
  padding: var(--sp-4);
  background: #FFFFFF;
  border: 1px solid var(--border-default);
  margin-bottom: var(--sp-4);
}
.detail-next-label {
  font-size: var(--text-xs); font-weight: 700; color: var(--text-500);
  margin-bottom: var(--sp-2);
}
.detail-next-text {
  font-size: var(--text-md); line-height: 1.6; color: var(--text-800);
}
.detail-decision-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0;
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
}
.detail-decision-item {
  border: none;
  border-right: 1px solid var(--border-subtle);
  border-radius: 0;
  padding: var(--sp-4) var(--sp-4) var(--sp-4) 0;
  background: transparent;
}
.detail-decision-item + .detail-decision-item { padding-left: var(--sp-4); }
.detail-decision-item:last-child { border-right: none; }
.detail-decision-label {
  font-size: 10px; font-weight: 700; color: var(--text-400);
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px;
}
.detail-decision-value {
  font-size: var(--text-sm); color: var(--text-700);
  line-height: 1.5; font-weight: 550;
}
.detail-compact-hero {
  background: transparent;
  border: none;
  border-top: 1px solid var(--border-subtle);
  border-radius: 0;
  padding: var(--sp-4) 0 0;
}
.detail-compact-title {
  font-size: var(--text-md); font-weight: 700; color: var(--text-900);
  line-height: 1.4; margin-bottom: var(--sp-3);
}
.detail-compact-meta {
  display: flex; flex-wrap: wrap; gap: var(--sp-2);
}

/* AI Assistant Card */
.detail-ai-card {
  background: transparent; border-radius: 0;
  border: none; border-top: 1px solid var(--border-subtle); padding: var(--sp-4) 0 0;
  display: flex; align-items: center; gap: var(--sp-3);
}
.detail-ai-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.detail-ai-info { flex: 1; min-width: 0; }
.detail-ai-name {
  font-size: var(--text-sm); font-weight: 700; color: var(--text-900);
  margin-bottom: 2px;
}
.detail-ai-desc {
  font-size: 11px; color: var(--text-500); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.detail-ai-status {
  font-size: 10px; font-weight: 600; color: var(--success);
  display: flex; align-items: center; gap: 4px; margin-top: 3px;
}
.detail-ai-status::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--success); animation: pulse-dot 2s infinite;
}

/* Legacy bottom actions */
.detail-actions-wrap {
  display: none;
}
.detail-btn {
  flex: 1; padding: var(--sp-3); border-radius: 8px;
  font-size: var(--text-sm); font-weight: 600; cursor: pointer;
  border: none; transition: all var(--t-fast);
  display: flex; align-items: center; justify-content: center; gap: var(--sp-2);
}
.detail-btn svg { width: 16px; height: 16px; }
.detail-btn-primary {
  background: var(--primary-600); color: #fff;
}
.detail-btn-primary:hover { background: var(--primary-700); transform: none; box-shadow: none; }
.detail-btn-ghost {
  background: transparent; color: var(--text-600);
  border: 1px solid var(--border-default);
}
.detail-btn-ghost:hover { background: var(--bg-hover); }

/* ============================================================
   DASHBOARD VIEW (经营管理者)
   ============================================================ */
.dashboard { padding: var(--sp-8) var(--sp-10); }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-8); }
.dash-title { font-size: var(--text-2xl); font-weight: 700; letter-spacing: 0; }
.dash-period {
  display: flex; align-items: center; gap: var(--sp-1);
  background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: var(--r-md); padding: 2px; font-size: var(--text-sm);
}
.dash-period-btn {
  padding: var(--sp-1) var(--sp-3); border-radius: var(--r-sm);
  color: var(--text-500); font-weight: 500; transition: all var(--t-fast);
}
.dash-period-btn:hover { color: var(--text-700); }
.dash-period-btn.active { background: var(--primary-600); color: #fff; }

.dash-kpi-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-4);
  margin-bottom: var(--sp-8);
}
.kpi-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-xl); padding: var(--sp-5); transition: all var(--t-fast);
}
.kpi-card:hover { border-color: var(--border-default); box-shadow: var(--shadow-xs); }
.kpi-label { font-size: var(--text-xs); color: var(--text-400); font-weight: 500; margin-bottom: var(--sp-2); }
.kpi-value { font-size: var(--text-3xl); font-weight: 700; letter-spacing: 0; color: var(--text-900); }
.kpi-change { display: inline-flex; align-items: center; gap: 3px; font-size: var(--text-xs); font-weight: 600; margin-top: var(--sp-1); padding: 1px 5px; border-radius: var(--r-xs); }
.kpi-change.up { color: var(--success); background: var(--flow-feature-bg); }
.kpi-change.down { color: var(--error); background: var(--flow-incident-bg); }

.dash-charts {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4);
  margin-bottom: var(--sp-8);
}
.chart-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-xl); padding: var(--sp-5);
}
.chart-card-title { font-size: var(--text-md); font-weight: 600; margin-bottom: var(--sp-5); }
.chart-placeholder {
  height: 200px; background: var(--bg-subtle); border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-300); font-size: var(--text-sm);
}

.dash-list {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-xl); overflow: hidden;
}
.dash-list-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-4) var(--sp-5); border-bottom: 1px solid var(--border-subtle);
}
.dash-list-title { font-size: var(--text-md); font-weight: 600; }
.dash-list-more { font-size: var(--text-sm); color: var(--primary-600); font-weight: 500; cursor: pointer; }
.dash-list-item {
  display: flex; align-items: center; gap: var(--sp-4);
  padding: var(--sp-3) var(--sp-5); border-bottom: 1px solid var(--border-subtle);
  transition: background var(--t-fast); cursor: pointer;
}
.dash-list-item:last-child { border-bottom: none; }
.dash-list-item:hover { background: var(--bg-subtle); }
.dash-list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dash-list-name { flex: 1; font-size: var(--text-base); font-weight: 500; }
.dash-list-meta { font-size: var(--text-xs); color: var(--text-400); }
.dash-list-tag {
  font-size: var(--text-xs); padding: 2px 8px; border-radius: var(--r-full); font-weight: 500;
}

/* ============================================================
   PROJECT VIEW (复合型研发经理)
   ============================================================ */
.projects { padding: var(--sp-8) var(--sp-10); }
.proj-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-6); }
.proj-title { font-size: var(--text-2xl); font-weight: 700; letter-spacing: 0; }

.proj-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--sp-4); margin-bottom: var(--sp-8);
}
.proj-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-xl); padding: var(--sp-5); cursor: pointer;
  transition: all var(--t-fast);
}
.proj-card:hover { border-color: var(--border-default); box-shadow: var(--shadow-sm); transform: translateY(-2px); }
.proj-card-top { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-4); }
.proj-card-icon {
  width: 36px; height: 36px; border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.proj-card-icon svg { width: 16px; height: 16px; }
.proj-card-name { font-size: var(--text-md); font-weight: 600; }
.proj-card-status {
  font-size: var(--text-xs); padding: 2px 7px; border-radius: var(--r-full); font-weight: 500;
  margin-left: auto;
}
.proj-card-progress { margin-bottom: var(--sp-4); }
.proj-progress-bar { height: 4px; background: var(--bg-hover); border-radius: 2px; overflow: hidden; }
.proj-progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s var(--ease); }
.proj-progress-info { display: flex; justify-content: space-between; margin-top: var(--sp-2); font-size: var(--text-xs); color: var(--text-400); }
.proj-card-stats { display: flex; gap: var(--sp-4); font-size: var(--text-xs); color: var(--text-500); }
.proj-card-stats span { display: flex; align-items: center; gap: 4px; }
.proj-card-stats svg { width: 12px; height: 12px; fill: var(--text-400); }

/* --- Kanban --- */
.kanban-section { margin-top: var(--sp-6); }
.kanban-title { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--sp-4); }
.kanban-board { display: flex; gap: var(--sp-4); overflow-x: auto; padding-bottom: var(--sp-4); }
.kanban-col { min-width: 260px; flex: 1; }
.kanban-col-header {
  display: flex; align-items: center; gap: var(--sp-2);
  margin-bottom: var(--sp-3); padding: 0 var(--sp-1);
}
.kanban-col-dot { width: 8px; height: 8px; border-radius: 50%; }
.kanban-col-name { font-size: var(--text-sm); font-weight: 600; color: var(--text-700); }
.kanban-col-count { font-size: var(--text-xs); color: var(--text-400); font-weight: 500; }
.kanban-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); padding: var(--sp-4); margin-bottom: var(--sp-2);
  cursor: pointer; transition: all var(--t-fast);
}
.kanban-card:hover { border-color: var(--border-default); box-shadow: var(--shadow-xs); }
.kanban-card-title { font-size: var(--text-base); font-weight: 500; margin-bottom: var(--sp-2); }
.kanban-card-meta { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--text-xs); color: var(--text-400); }

/* ============================================================
   WORKSPACE VIEW (Chat-First IM-Driven)
   ============================================================ */
.ws-container { display: flex; flex-direction: column; height: 100%; }

/* --- Task Context Bar (simplified) --- */
.ws-ctx-bar {
  height: 48px; border-bottom: 1px solid var(--border-default);
  display: flex; align-items: center; padding: 0 var(--sp-5); gap: var(--sp-3);
  background: var(--bg-surface); flex-shrink: 0;
}
.ws-flow-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 6px;
  font-size: var(--text-xs); font-weight: 600;
}
.ws-flow-tag svg { width: 12px; height: 12px; }
.ws-task-title {
  font-size: var(--text-md); font-weight: 600; color: var(--text-900);
  flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ws-step-indicator { font-size: var(--text-xs); color: var(--text-400); white-space: nowrap; }
.ws-context-btn {
  display: inline-flex; align-items: center; gap: 5px;
  height: 30px; padding: 0 var(--sp-3);
  border-radius: 8px; border: 1px solid var(--border-default);
  background: var(--bg-surface); color: var(--text-600);
  font-size: var(--text-xs); font-weight: 600;
  transition: all var(--t-fast); white-space: nowrap;
}
.ws-context-btn:hover {
  background: var(--bg-hover); color: var(--text-900);
  border-color: var(--border-strong);
}
.ws-context-btn svg { width: 14px; height: 14px; fill: currentColor; }

/* --- Incident Alert Bar --- */
.ws-incident-bar {
  background: #FFF7F7; color: #991B1B;
  padding: 7px var(--sp-5); display: flex; align-items: center; gap: var(--sp-3);
  font-size: var(--text-sm); font-weight: 600; flex-shrink: 0;
  border-bottom: 1px solid #F4D7D7;
}
.ws-incident-bar svg { width: 16px; height: 16px; fill: #fff; }
.ws-incident-pulse { width: 6px; height: 6px; border-radius: 50%; background: #DC2626; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.ws-incident-label {
  background: #FEE2E2; padding: 1px 7px; border-radius: 5px;
  font-size: var(--text-xs);
}
.ws-incident-detail { margin-left: auto; font-size: var(--text-sm); font-weight: 400; opacity: 0.9; }

/* --- Back Button --- */
.ws-back-btn {
  width:30px; height:30px; border-radius:var(--r-md); display:flex; align-items:center; justify-content:center;
  transition:background var(--t-fast); color:var(--text-500); flex-shrink:0;
}
.ws-back-btn:hover { background:var(--bg-hover); color:var(--text-700); }
.ws-back-btn svg { width:16px; height:16px; fill:currentColor; }

/* --- Main body: Chat + Tool Panel --- */
.ws-body { display: flex; flex: 1; min-height: 0; }

/* --- Chat Area (main) --- */
.ws-chat {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; background: var(--bg-surface);
}
.ws-chat-messages {
  flex: 1; overflow-y: auto; padding: var(--sp-5) var(--sp-6);
  display: flex; flex-direction: column; gap: var(--sp-4);
  width: min(100%, 920px); align-self: center;
}

/* --- Chat Bubbles --- */
.chat-msg { display: flex; gap: var(--sp-3); max-width: 85%; }
.chat-msg.user { flex-direction: row-reverse; align-self: flex-end; }
.chat-msg .chat-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.chat-msg .chat-bubble {
  padding: 10px 13px; border-radius: 8px;
  font-size: var(--text-md); line-height: var(--lh-relaxed);
}
.chat-msg.bot .chat-bubble {
  background: #F7F8FA; border: 1px solid var(--border-subtle);
  border-top-left-radius: 4px; color: var(--text-700);
}
.chat-msg.user .chat-bubble {
  background: var(--primary-600); color: #fff;
  border-top-right-radius: 4px;
}
.chat-msg .chat-time {
  font-size: 10px; color: var(--text-400); margin-top: 4px;
}
.chat-msg.user .chat-time { text-align: right; }

/* --- Embedded Tool Cards (in chat flow) --- */
.chat-card {
  background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: 8px; overflow: hidden;
  margin-top: var(--sp-2); cursor: pointer;
  transition: all var(--t-fast);
  max-width: 520px;
}
.chat-card:hover { border-color: var(--border-strong); box-shadow: none; }
.chat-card-header {
  padding: var(--sp-3) var(--sp-4); display: flex; align-items: center; gap: var(--sp-2);
  border-bottom: 1px solid var(--border-subtle); background: var(--bg-subtle);
}
.chat-card-icon {
  width: 20px; height: 20px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0;
}
.chat-card-title { font-size: var(--text-sm); font-weight: 600; color: var(--text-700); flex: 1; }
.chat-card-action {
  font-size: var(--text-xs); color: var(--text-700); font-weight: 600;
  display: flex; align-items: center; gap: 2px;
}
.chat-card-body { padding: var(--sp-3) var(--sp-4); }

/* Card type: code */
.chat-card-code {
  background: #1E1E2E; color: #CDD6F4; font-family: var(--font-mono);
  font-size: 11px; line-height: 1.7; max-height: 180px; overflow-y: auto;
  border-radius: 0;
}

/* Card type: metrics */
.chat-card-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-2); }
.chat-card-metric-item { text-align: center; padding: var(--sp-2); }
.chat-card-metric-val { font-size: var(--text-lg); font-weight: 700; }
.chat-card-metric-label { font-size: 10px; color: var(--text-400); }

/* Card type: list */
.chat-card-list { font-size: var(--text-sm); }
.chat-card-list-item {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) 0; border-bottom: 1px solid var(--border-subtle);
  font-size: var(--text-sm); color: var(--text-600);
}
.chat-card-list-item:last-child { border-bottom: none; }

/* Card type: diff stats */
.chat-card-diff-stats { display: flex; gap: var(--sp-4); align-items: baseline; }
.chat-card-diff-stats .add { color: #A6E3A1; font-weight: 600; }
.chat-card-diff-stats .del { color: #F38BA8; font-weight: 600; }

/* --- Suggested Steps Bubble --- */
.chat-step-suggest {
  background: #FFFFFF; border: 1px solid var(--border-default);
  border-radius: 8px; padding: var(--sp-3) var(--sp-4);
  margin-top: var(--sp-2);
}
.chat-step-suggest-title {
  font-size: var(--text-xs); font-weight: 600; color: var(--text-500);
  margin-bottom: var(--sp-2); text-transform: uppercase; letter-spacing: 0.3px;
}
.chat-step-btn {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  padding: 7px 11px; border-radius: 7px;
  font-size: var(--text-sm); font-weight: 500; cursor: pointer;
  background: var(--primary-600); color: #fff; border: none;
  transition: all var(--t-fast); margin-right: var(--sp-2); margin-bottom: var(--sp-2);
}
.chat-step-btn:hover { background: var(--primary-700); transform: none; }
.chat-step-btn.ghost {
  background: transparent; color: var(--text-700);
  border: 1px solid var(--border-default);
}
.chat-step-btn.ghost:hover { background: var(--bg-hover); }

/* --- Right Panel (always visible: Guide or Tool) --- */
.ws-right-panel {
  width: 0; border-left: 0 solid transparent;
  background: var(--bg-surface); display: flex; flex-direction: column;
  flex-shrink: 0; transition: width 0.3s var(--ease), border-color 0.3s var(--ease);

}

function renderRoleDropdown() {
  const dd = document.getElementById('role-dropdown');
  dd.innerHTML = Object.values(roles).map(r => `
    <div class="role-option ${currentRole === r.id ? 'active' : ''}" onclick="switchRole('${r.id}')">
      <div class="role-option-icon" style="background:${r.avatar}"><span style="color:#fff;font-size:12px;font-weight:600">张</span></div>
      <div class="role-option-info"><div class="role-option-name">${r.name}</div><div class="role-option-desc">${r.desc}</div></div>
      ${currentRole === r.id ? '<svg class="role-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : ''}
    </div>
  `).join('');
}

let roleDropdownOpen = false;
function toggleRoleDropdown() {
  roleDropdownOpen = !roleDropdownOpen;
  document.getElementById('role-dropdown').classList.toggle('show', roleDropdownOpen);
}

function switchRole(roleId) {
  currentRole = roleId;
  roleDropdownOpen = false;
  document.getElementById('role-dropdown').classList.remove('show');
  currentView = 'home';
  currentTask = null;
  renderSidebar();
  renderView();
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(viewId) {
  currentView = viewId;
  currentTask = null;
  renderSidebar();
  renderView();
}

function renderView() {
  const main = document.getElementById('main');
  if (currentView === 'home') {
    renderHome();
  } else if (currentView === 'dashboard') {
    renderDashboard();
  } else if (currentView === 'projects' || currentView === 'kanban') {
    renderProjects();
  } else if (currentView === 'workspace') {
    renderWorkspace();
  } else {
    main.innerHTML = `<div style="padding:80px 40px;text-align:center"><div style="font-size:48px;margin-bottom:16px">🚧</div><div style="font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text-700)">页面开发中</div><div style="color:var(--text-400);font-size:14px">此视图正在设计中，敬请期待</div></div>`;
  }
}

let selectedTaskId = null;

function getTaskScore(t) {
  const urgency = priorityRank[t.priority] ?? 9;
  const flowBoost = t.flow === 'incident' ? -0.5 : 0;
  const stepBoost = t.step > 0 ? -0.2 : 0;
  return urgency + flowBoost + stepBoost;
}

function pickFocusTask(list) {
  return [...list].sort((a, b) => getTaskScore(a) - getTaskScore(b))[0] || null;
}

function flowFilterLabel(id) {
  return {
    'ones-bug': 'BUG',
    'incident': '故障',
    'feature': '需求',
    'initiative': '立项',
    'review': '审查',
    'delivery': '验收'
  }[id] || flows[id]?.name || id;
}

function renderHome(filterFlow) {
  const main = document.getElementById('main');
  const pending = tasks.filter(t => t.step === 0);
  const inProgress = tasks.filter(t => t.step > 0);
  const filtered_pending = filterFlow ? pending.filter(t => t.flow === filterFlow) : pending;
  const filtered_progress = filterFlow ? inProgress.filter(t => t.flow === filterFlow) : inProgress;
  const visibleTasks = [...filtered_pending, ...filtered_progress];
  const p0Count = tasks.filter(t=>t.priority==='P0').length;
  const focusTask = pickFocusTask(visibleTasks);
  if (!selectedTaskId || !visibleTasks.some(t => t.id === selectedTaskId)) {
    selectedTaskId = focusTask?.id || null;
  }

  main.innerHTML = `<div class="home fade-in">
    <!-- Left Panel -->
    <div class="home-left">
      <div class="home-left-header">
        <div class="home-greeting">我的任务</div>
        <div class="home-stats">
	          <div class="stat-pill" style="${p0Count?'color:#DC2626':''}">
            <span class="stat-pill-dot" style="background:${p0Count?'#EF4444':'#D1D5DB'}"></span>
            <span class="stat-pill-num">${p0Count}</span> 紧急
          </div>
          <div class="stat-pill">
            <span class="stat-pill-dot" style="background:var(--primary-500)"></span>
            <span class="stat-pill-num">${inProgress.length}</span> 进行中
          </div>
          <div class="stat-pill">
            <span class="stat-pill-dot" style="background:var(--flow-feature)"></span>
            <span class="stat-pill-num">5</span> 已完成
          </div>
        </div>
        <div class="home-filters">
	          <div class="filter-chip ${!filterFlow?'active':''}" onclick="selectedTaskId=null;renderHome()">全部</div>
	          ${Object.values(flows).map(f => `
	            <div class="filter-chip ${filterFlow===f.id?'active':''}" onclick="selectedTaskId=null;renderHome('${f.id}')">
	              <span class="filter-dot" style="background:${f.hex}"></span>${flowFilterLabel(f.id)}
	            </div>
	          `).join('')}
        </div>
      </div>
      <div class="home-task-list">
        ${filtered_pending.length ? `
        <div class="task-group">
          <div class="task-group-header">
            <span class="task-group-title">待处理</span>
            <span class="task-group-count">${filtered_pending.length}</span>
          </div>
	          ${filtered_pending.map(t => renderTaskCard(t)).join('')}
        </div>` : ''}
        ${filtered_progress.length ? `
        <div class="task-group">
          <div class="task-group-header">
            <span class="task-group-title">进行中</span>
            <span class="task-group-count">${filtered_progress.length}</span>
          </div>

	    <div class="home-right" id="previewPanel">
	      ${selectedTaskId ? renderPreview(selectedTaskId) : renderEmptyPreview()}
    </div>
  </div>`;
}

function renderTaskCard(t) {
  const f = flows[t.flow];
  const sel = selectedTaskId === t.id;
  return `<div class="task-card ${sel?'selected':''}" data-flow="${t.flow}" onclick="selectTask('${t.id}', this)">

        <span>${t.source}</span>

    </div>
    <div class="tc-right">
      <span class="priority p${t.priority[1]}">${t.priority}</span>
      <span class="tc-step">${f.steps[t.step]}</span>
    </div>
  </div>`;
}

function selectTask(id, el) {
  selectedTaskId = id;
  const cards = document.querySelectorAll('.task-card');
  cards.forEach(c => c.classList.remove('selected'));
  if (el) el.classList.add('selected');
  const panel = document.getElementById('previewPanel');
  if (panel) panel.innerHTML = renderPreview(id);

    body = `<div class="chat-card-list">${card.items.map(i=>`<div class="chat-card-list-item">${i}</div>`).join('')}</div>`;
  } else if (card.type === 'metrics') {
    body = `<div class="chat-card-metrics">${card.metrics.map(m=>`<div class="chat-card-metric-item"><div class="chat-card-metric-val" style="${m.color?'color:'+m.color:''}">${m.val}</div><div class="chat-card-metric-label">${m.label}</div></div>`).join('')}</div>`;
  } else if (card.type === 'diffStats') {
    body = `<div class="chat-card-body"><div class="chat-card-diff-stats"><span>${card.files} files</span><span class="add">+${card.add}</span><span class="del">-${card.del}</span></div></div>`;
  } else if (card.type === 'diff') {
    body = `<div class="chat-card-body"><div class="chat-card-diff-stats"><span class="add">+${card.addLines}</span><span class="del">-${card.delLines}</span></div></div>`;
  } else if (card.type === 'log') {
    body = `<div class="chat-card-code">${card.logs.join('<br>')}</div>`;
  }
  const onclick = card.toolType ? `onclick="openToolPanel('${card.toolType}','${card.toolData}')"` : '';
  return `<div class="chat-card" ${onclick}>
    <div class="chat-card-header">
      <div class="chat-card-icon" style="background:${card.iconBg}">${card.icon}</div>
      <div class="chat-card-title">${card.title}</div>
      ${card.action ? `<div class="chat-card-action">${card.action} →</div>` : ''}
    </div>
    ${body}
  </div>`;
}

// --- Helper: render step suggestion ---
function renderSuggest(suggest) {
  if (!suggest) return '';
  return `<div class="chat-step-suggest">
    <div class="chat-step-suggest-title">${suggest.title}</div>
    ${suggest.buttons.map(b=>`<button class="chat-step-btn ${b.ghost?'ghost':''}" ${b.action?`onclick="${b.action}()"`:''} }>${b.label}</button>`).join('')}
  </div>`;
}

function taskTitleParts(t) {
  const match = t.title.match(/^([^:：]+)[:：]\s*(.+)$/);
  return {
    code: match ? match[1] : t.title,
    subject: match ? match[2] : t.title
  };
}

function formatMessageText(text, t) {
  const parts = taskTitleParts(t);
  return text
    .replace(/BUG-2341「SSO 登录偶发白屏」/g, `${parts.code}「${parts.subject}」`)
    .replace(/BUG-2341/g, parts.code)
    .replace(/SSO 登录偶发白屏/g, parts.subject);
}

        <div style="font-size:var(--text-xs);color:var(--text-500);line-height:1.6">由 ${flows[currentTask?.flow]?.ai.name || '数字员工'} 根据当前对话、工具调用和任务上下文整理。</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2)">
        <div class="metric-card"><div><div class="metric-num" style="color:var(--success)">通过</div><div class="metric-label">回归验证</div></div></div>
        <div class="metric-card"><div><div class="metric-num">3 项</div><div class="metric-label">改进建议</div></div></div>
      </div>
      <div style="border:1px solid var(--border-subtle);border-radius:var(--r-lg);overflow:hidden;background:var(--bg-surface)">
        ${['影响范围已收敛，核心指标恢复到 SLO 范围内','根因已定位到最近配置/代码变更，证据链完整','后续建议补审批、监控阈值和回归检查清单'].map(i => `<div style="padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border-subtle);font-size:var(--text-sm);color:var(--text-700);line-height:1.5">${i}</div>`).join('')}
      </div>
    </div>`;
  } else {
    title.textContent = '文档详情';
    body.innerHTML = `<div style="padding:var(--sp-4);color:var(--text-500);font-size:var(--text-sm)">点击对话中的工具卡片查看详细内容</div>`;
  }
}

// ============================================================
// TOAST NOTIFICATIONS
// ============================================================
function showToast(title, msg, type = 'info', duration = 3000) {
  const container = document.getElementById('toast-container');
  const icons = { success:'✓', error:'✗', warn:'!', info:'i' };
  const id = 'toast-' + Date.now();
  const el = document.createElement('div');
  el.className = 'toast';
  el.id = id;
  el.style.position = 'relative';
  el.innerHTML = `
    <div class="toast-icon toast-icon-${type}">${icons[type]}</div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      ${msg ? `<div class="toast-msg">${msg}</div>` : ''}
    </div>
    <div class="toast-close" onclick="dismissToast('${id}')"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>
    <div class="toast-progress toast-progress-${type}" style="animation-duration:${duration}ms"></div>`;
  container.appendChild(el);
  setTimeout(() => dismissToast(id), duration);
}
function dismissToast(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('toast-exit');
  setTimeout(() => el.remove(), 300);
}

// ============================================================
// COLLAPSE PANEL
// ============================================================
function toggleCollapse(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  panel.classList.toggle('open');
}

// ============================================================
// WORKSPACE INTERACTIONS
// ============================================================

// ============================================================
// INIT
// ============================================================
renderSidebar();
renderView();

// Close role dropdown on outside click
document.addEventListener('click', (e) => {
  if (roleDropdownOpen && !e.target.closest('.sb-user-card') && !e.target.closest('.role-dropdown')) {
    roleDropdownOpen = false;
    document.getElementById('role-dropdown').classList.remove('show');
  }
});
</script>
